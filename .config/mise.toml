[tools]
"github:axodotdev/cargo-dist" = "0.31.0"
"github:obi1kenobi/cargo-semver-checks" = "0.46.0"
"github:EmbarkStudios/cargo-deny" = "0.19.0"
"github:charmbracelet/vhs" = "0.10.0"
ttyd = "1.7.3"

[settings]
github.github_attestations = true
github.slsa = true
lockfile = true
locked = true
# Read the rust version + components from rust-toolchain.toml (the
# canonical Rust declarative config). mise.lock still needs a rust
# entry because `locked = true` requires every resolved tool to be
# in the lockfile.
idiomatic_version_file_enable_tools = ["rust"]
