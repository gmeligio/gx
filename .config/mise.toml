# Local-only demo tools (ttyd, vhs) live in the gitignored .config/mise.local.toml
# so CI never installs them and cannot dirty .config/mise.lock.
[tools]
"github:axodotdev/cargo-dist" = "0.31.0"
"github:EmbarkStudios/cargo-deny" = "0.19.0"
"aqua:j178/prek" = "0.4.4"
shellcheck = "0.11.0"

[settings]
github.github_attestations = true
github.slsa = true
lockfile = true
# `locked = false` (not true): mise >= 2026.6.0 cannot write a lock entry
# for the `core:rust` backend resolved from rust-toolchain.toml, yet under
# `locked = true` it *requires* rust to be in the lockfile — a catch-22 that
# breaks `mise install --locked` in CI. With `locked = false` the lockfile
# still pins every other tool's checksum (lockfile = true), and rust is
# pinned by rust-toolchain.toml, its canonical source.
locked = false
# Read the rust version + components from rust-toolchain.toml.
idiomatic_version_file_enable_tools = ["rust"]

# Local happy-path gate: one command that runs the fast verification set by
# aggregating the per-check tasks (no command is re-spelled). Defined here in
# TOML rather than as a file task because mise has no primary-file-in-directory
# convention, so a file in tasks/test/ can only produce a `test:<name>` task —
# the bare `test` name is reachable only from outside the directory.
# keep `depends` in sync with the PR-check jobs in .github/workflows/build.yml
[tasks.test]
description = "Local gate: typecheck, format, lint, size budgets, unit tests"
depends = ["check", "format:check", "clippy:check", "lint:size", "test:unit"]
