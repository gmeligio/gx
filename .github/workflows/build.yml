name: Build

on:
    pull_request:
        branches: [main]

# Read-only permissions by default
permissions:
    contents: read

jobs:
    check:
        name: Check
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
            - run: cargo check --locked

    fmt:
        name: Format
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            # Reads toolchain + components from rust-toolchain.toml.
            # Runs before mise-action so rustup has the components installed
            # before mise sets RUSTUP_TOOLCHAIN.
            - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
            - run: cargo fmt --check

    clippy:
        name: Clippy
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            # Reads toolchain + components from rust-toolchain.toml.
            # Runs before mise-action so rustup has the components installed
            # before mise sets RUSTUP_TOOLCHAIN.
            - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
            - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
            - run: mise run clippy

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
            - run: mise run test

    integration-tests:
        name: Integration Tests
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
            - run: mise run integ

    e2e-tests:
        name: E2E Tests
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
            - run: mise run e2e
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    deny:
        name: Deny
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
            - run: mise run deny
