name: Release-plz

on:
    push:
        branches:
            - main

jobs:
    release-plz-release:
        name: Release-plz release
        runs-on: ubuntu-24.04
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: false
            - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
            - name: Generate authentication token with GitHub App to trigger Actions
              uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
              id: app-token
              with:
                  app-id: ${{ secrets.VERIFIED_COMMIT_ID }}
                  private-key: ${{ secrets.VERIFIED_COMMIT_KEY }}
                  repositories: ${{ github.event.repository.name }}
                  owner: ${{ github.repository_owner }}
            - uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
              with:
                  command: release
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

    release-plz-pr:
        name: Release-plz PR
        runs-on: ubuntu-24.04
        permissions:
            contents: write
            pull-requests: write
        concurrency:
            group: release-plz-${{ github.ref }}
            cancel-in-progress: false
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: false
            - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
            - name: Generate authentication token with GitHub App to trigger Actions
              uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
              id: app-token
              with:
                  app-id: ${{ secrets.VERIFIED_COMMIT_ID }}
                  private-key: ${{ secrets.VERIFIED_COMMIT_KEY }}
                  repositories: ${{ github.event.repository.name }}
                  owner: ${{ github.repository_owner }}
            - uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
              with:
                  command: release-pr
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
